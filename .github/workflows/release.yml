name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and publish (e.g. v1.1.0)'
        required: true
        type: string

env:
  ARSENAL_REPO: karn-mtg/karn

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            arsenal_platform: win
          - os: macos-latest
            platform: mac
            arsenal_platform: mac
          - os: ubuntu-latest
            platform: linux
            arsenal_platform: linux

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Download latest karn-arsenal release
        shell: bash
        run: |
          mkdir -p resources/arsenal
          # Find the latest server-v* release and download the platform asset
          ASSET_URL=$(curl -sf "https://api.github.com/repos/${{ env.ARSENAL_REPO }}/releases" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); s=next((r for r in (d if isinstance(d,list) else []) if str(r.get('tag_name','')).startswith('server-v') and not r.get('draft') and not r.get('prerelease')),None); a=[x for x in s.get('assets',[]) if '${{ matrix.arsenal_platform }}' in x.get('name','')] if s else []; print(a[0]['browser_download_url'] if a else '')" \
            2>/dev/null || echo "")
          if [ -z "$ASSET_URL" ]; then
            echo "No karn-arsenal asset found for ${{ matrix.arsenal_platform }}, skipping bundled server"
          else
            curl -L "$ASSET_URL" -o arsenal.zip
            unzip -o arsenal.zip -d resources/
            echo "karn-arsenal extracted to resources/arsenal"
          fi

      - name: Generate icon.ico (Windows only)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: magick icon.png -define icon:auto-resize=256,128,64,48,32,16 icon.ico

      - name: Build Vite frontend
        run: npm run build

      - name: Build Electron installer and publish to GitHub Release
        run: npx electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Override GITHUB_REF for workflow_dispatch so electron-builder uploads to the right release tag
          GITHUB_REF: ${{ github.event.inputs.tag && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}
