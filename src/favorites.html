<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KarnForge — Favorites</title>
  <link rel="stylesheet" href="./styles/output.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
</head>
<body class="bg-background text-on-background font-body-md selection:bg-primary/30 antialiased">

<!-- Sidebar -->
<aside class="fixed h-screen w-[280px] left-0 top-0 glass-sidebar border-r border-white/5 z-50 flex flex-col">

  <!-- Traffic lights -->
  <div class="h-12 flex items-center px-6 gap-2 titlebar-drag">
    <button class="traffic-light traffic-light-close no-drag"
            onclick="window.electronAPI.closeWindow()"
            title="Close"></button>
    <button class="traffic-light traffic-light-minimize no-drag"
            onclick="window.electronAPI.minimizeWindow()"
            title="Minimize"></button>
    <button class="traffic-light traffic-light-maximize no-drag"
            onclick="window.electronAPI.maximizeWindow()"
            title="Maximize"></button>
  </div>

  <div class="px-4 py-4 flex-1 overflow-y-auto">
    <!-- App logo -->
    <div class="flex items-center gap-3 mb-8 px-2">
      <div class="w-8 h-8 rounded-lg bg-primary-container flex items-center justify-center">
        <span class="material-symbols-outlined text-on-primary-fixed text-xl" style="font-variation-settings: 'FILL' 1;">playing_cards</span>
      </div>
      <h1 class="font-headline-md text-lg font-bold text-primary tracking-tight">KarnForge</h1>
    </div>

    <nav class="space-y-0.5">
      <a class="flex items-center px-3 py-1.5 hover:bg-white/5 rounded-md text-on-surface-variant transition-all text-body-md" href="./dashboard.html">
        <span class="material-symbols-outlined mr-2 text-[18px]">dashboard</span>
        <span>Dashboard</span>
      </a>

      <div class="pt-4 pb-1 px-3">
        <p class="font-label-sm text-[10px] uppercase tracking-widest text-outline/40 font-bold">Library</p>
      </div>

      <!-- Dynamic folder/deck tree -->
      <div id="folder-tree" class="space-y-0.5"></div>

      <div class="pt-6 pb-1 px-3">
        <p class="font-label-sm text-[10px] uppercase tracking-widest text-outline/40 font-bold">Preferences</p>
      </div>

      <!-- Favorites — active -->
      <a class="flex items-center tree-item-active px-3 py-1.5 rounded-md transition-all text-body-md" href="./favorites.html">
        <span class="material-symbols-outlined mr-2 text-[18px]" style="font-variation-settings: 'FILL' 1;">star</span>
        <span>Favorites</span>
      </a>
      <!-- Recents — inactive -->
      <a class="flex items-center hover:bg-white/5 px-3 py-1.5 rounded-md text-on-surface-variant transition-all text-body-md" href="./recents.html">
        <span class="material-symbols-outlined mr-2 text-[18px]">schedule</span>
        <span>Recents</span>
      </a>
      <a class="flex items-center hover:bg-white/5 px-3 py-1.5 rounded-md text-on-surface-variant transition-all text-body-md" href="./collection.html">
        <span class="material-symbols-outlined mr-2 text-[18px]">inventory_2</span>
        <span>Collection</span>
      </a>
      <a class="flex items-center hover:bg-white/5 px-3 py-1.5 rounded-md text-on-surface-variant transition-all text-body-md" href="./wishlist.html">
        <span class="material-symbols-outlined mr-2 text-[18px]">bookmark</span>
        <span>Wishlist</span>
      </a>
    </nav>
  </div>
</aside>

<!-- Top header -->
<header class="sticky top-0 w-full z-40 bg-background/80 backdrop-blur-md border-b border-white/5">
  <div class="flex justify-between items-center h-16 px-margin-desktop ml-[280px] titlebar-drag">
    <div class="flex-1 max-w-xl no-drag">
      <div class="relative group">
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 group-focus-within:text-primary transition-colors">search</span>
        <input
          id="global-search-input"
          class="w-full bg-surface-container/50 border border-white/5 rounded-lg py-2 pl-12 pr-4 text-body-md focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/10 transition-all placeholder:text-on-surface-variant/30"
          placeholder="Search your library..."
          type="text"
        />
      </div>
    </div>
    <div class="flex items-center gap-2 no-drag">
      <a href="./settings.html" class="w-9 h-9 rounded-lg flex items-center justify-center text-on-surface-variant hover:bg-white/5 transition-all">
        <span class="material-symbols-outlined text-[22px]">settings</span>
      </a>
    </div>
  </div>
</header>

<!-- Main content -->
<main class="ml-[280px] p-margin-desktop min-h-screen">
  <div class="max-w-[1400px] mx-auto space-y-8">

    <!-- Page heading -->
    <section>
      <div class="flex items-center gap-3 mb-2">
        <span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">star</span>
        <h2 class="font-headline-lg text-2xl text-on-surface">Favorites</h2>
      </div>
      <p class="text-on-surface-variant text-body-md">Decks you've starred</p>
    </section>

    <!-- Deck grid / empty state -->
    <section>
      <div id="deck-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
      <div id="empty-state" class="hidden flex flex-col items-center justify-center py-32 text-center">
        <span class="material-symbols-outlined text-[80px] text-on-surface-variant/20 mb-6" style="font-variation-settings: 'FILL' 1;">star</span>
        <p class="font-headline-md text-xl text-on-surface mb-2">No favorites yet</p>
        <p class="text-on-surface-variant/60 text-body-md max-w-xs">Open a deck and mark it as favorite in Deck Settings</p>
      </div>
    </section>

  </div>
</main>

<script>
  const COLOR_META = {
    W: '#f0d870', U: '#4a7cc9', B: '#5a5a5a', R: '#c0392b', G: '#27ae60',
  };
  const FORMAT_LABELS = {
    commander: 'Commander', modern: 'Modern', standard: 'Standard',
    pioneer: 'Pioneer', legacy: 'Legacy', vintage: 'Vintage', pauper: 'Pauper',
  };

  function colorDots(identity) {
    if (!identity) return '';
    return identity.toUpperCase().split('').map(c => {
      const hex = COLOR_META[c] || '#888';
      return `<div class="w-4 h-4 rounded-full border border-black/50 shadow-sm flex-shrink-0" style="background:${hex}"></div>`;
    }).join('');
  }

  function timeAgo(iso) {
    if (!iso) return '';
    const mins = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  function renderDeckGrid(decks) {
    const grid = document.getElementById('deck-grid');
    const emptyState = document.getElementById('empty-state');
    grid.innerHTML = '';

    if (decks.length === 0) {
      emptyState.classList.remove('hidden');
      return;
    }

    emptyState.classList.add('hidden');
    decks.forEach(deck => {
      const a = document.createElement('a');
      a.href = `./deckview.html?id=${deck.id}`;
      a.className = 'group relative aspect-[3/4.2] bg-surface rounded-2xl overflow-hidden border border-white/5 hover:border-primary/30 transition-all duration-500 shadow-xl hover:-translate-y-2 block';
      const formatLabel = FORMAT_LABELS[deck.format] || deck.format;
      const dots = colorDots(deck.color_identity);
      const cardCount = deck.cards ? deck.cards.length : 0;
      const coverBg = deck.cover_image_url
        ? `<img src="${deck.cover_image_url}" class="absolute inset-0 w-full h-full object-cover object-top opacity-40" />`
        : `<div class="absolute inset-0 flex items-center justify-center opacity-10"><span class="material-symbols-outlined text-[140px] text-primary">style</span></div>`;
      a.innerHTML = `
        <div class="absolute inset-0 bg-gradient-to-t from-background via-background/40 to-transparent z-10"></div>
        ${coverBg}
        <div class="absolute bottom-0 left-0 right-0 p-5 z-20">
          <div class="flex justify-between items-start mb-2">
            <span class="px-2 py-0.5 rounded-md bg-black/60 backdrop-blur-md border border-white/10 text-[9px] font-bold uppercase tracking-wider text-primary">${formatLabel}</span>
            <div class="flex -space-x-1">${dots}</div>
          </div>
          <h3 class="font-headline-md text-lg text-on-surface mb-1 truncate">${deck.name}</h3>
          <div class="flex items-center justify-between text-on-surface-variant/60">
            <span class="text-[11px]">${cardCount} Cards</span>
            <span class="text-[10px]">${timeAgo(deck.updated_at)}</span>
          </div>
        </div>`;
      grid.appendChild(a);
    });
  }

  function renderFolderTree(tree) {
    function buildFolderNode(folder) {
      const details = document.createElement('details');
      details.open = true;

      const summary = document.createElement('summary');
      summary.className = 'flex items-center px-3 py-1.5 hover:bg-white/5 rounded-md cursor-pointer text-on-surface-variant/80 transition-colors';
      summary.innerHTML = `
        <span class="material-symbols-outlined disclosure-arrow mr-1 text-[16px]">chevron_right</span>
        <span class="material-symbols-outlined mr-2 text-[16px]">${folder.icon || 'folder'}</span>
        <span class="text-body-md flex-1">${folder.name}</span>`;
      details.appendChild(summary);

      if (folder.children && folder.children.length > 0) {
        const inner = document.createElement('div');
        inner.className = 'ml-4 pl-3 border-l border-white/5 space-y-0.5 mt-0.5';
        folder.children.forEach(child => inner.appendChild(buildFolderNode(child)));
        details.appendChild(inner);
      }
      return details;
    }

    const container = document.getElementById('folder-tree');
    container.innerHTML = '';

    const collectionsDetails = document.createElement('details');
    collectionsDetails.open = true;
    collectionsDetails.innerHTML = `
      <summary class="flex items-center px-3 py-1.5 hover:bg-white/5 rounded-md cursor-pointer text-on-surface-variant transition-colors">
        <span class="material-symbols-outlined disclosure-arrow mr-1 text-[18px]">chevron_right</span>
        <span class="material-symbols-outlined mr-2 text-[18px]">folder</span>
        <span class="text-body-md flex-1">My Collections</span>
      </summary>`;
    const inner = document.createElement('div');
    inner.className = 'ml-4 pl-3 border-l border-white/5 space-y-0.5 mt-0.5';
    tree.forEach(f => inner.appendChild(buildFolderNode(f)));
    collectionsDetails.appendChild(inner);
    container.appendChild(collectionsDetails);
  }

  async function init() {
    try {
      const [tree, decks] = await Promise.all([
        window.libraryAPI.getFolderTree(),
        window.libraryAPI.getDecks(),
      ]);
      renderFolderTree(tree);
      const favorites = decks.filter(d => d.is_favorite);
      renderDeckGrid(favorites);
    } catch (err) {
      console.error('Failed to load library data:', err);
    }
  }

  init();
</script>
</body>
</html>
